<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्वयंसेवक अर्ज | Raktdata.in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #c62828; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #c62828; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .success-msg { display: none; color: green; font-weight: bold; text-align: center; background: #e8f5e9; padding: 15px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="form-box">
    <h2><i class="fa-solid fa-wpforms"></i> स्वयंसेवक अर्ज फॉर्म</h2>
    <hr><br>
    
    <div id="successMessage" class="success-msg">
        🎉 तुमचा अर्ज यशस्वीरित्या सादर झाला आहे! ॲडमिनद्वारे मंजुरी मिळाल्यानंतर तुम्हाला तुमचे नियुक्ती पत्र दिले जाईल.
    </div>

    <form id="applyForm">
        <div class="form-group">
            <label>पूर्ण नाव:</label>
            <input type="text" id="fullName" placeholder="उदा. दिलीप मच्छिंद्रनाथ गायकवाड" required>
        </div>
        <div class="form-group">
            <label>मोबाईल नंबर:</label>
            <input type="tel" id="mobile" placeholder="उदा. 98xxxxxxxx" pattern="[0-9]{10}" required>
        </div>
        <div class="form-group">
            <label>विभाग:</label>
            <select id="division" required>
                <option value="कोकण विभाग">कोकण विभाग</option>
                <option value="पुणे विभाग">पुणे विभाग</option>
                <option value="नाशिक विभाग">नाशिक विभाग</option>
            </select>
        </div>
        <div class="form-group">
            <label>शहर / जिल्हा:</label>
            <input type="text" id="city" placeholder="उदा. मुंबई" required>
        </div>
        <button type="submit" class="btn">अर्ज सादर करा</button>
    </form>
</div>

<script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // नवीन अर्जदार ऑब्जेक्ट
        const applicant = {
            id: 'RDN-' + Math.floor(1000 + Math.random() * 9000),
            name: document.getElementById('fullName').value,
            mobile: document.getElementById('mobile').value,
            division: document.getElementById('division').value,
            city: document.getElementById('city').value,
            status: 'पेंडिंग',
            date: new Date().toLocaleDateString('mr-IN')
        };

        // जुना डेटा आणणे व नवीन जोडणे
        let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
        applicants.push(applicant);
        localStorage.setItem('applicants', JSON.stringify(applicants));

        // फॉर्म लपवून मेसेज दाखवणे
        document.getElementById('applyForm').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>स्वयंसेवक व रक्तदाता नोंदणी | RAKTDATA.IN</title>
  
  <!-- Font Awesome Icons & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
    }

    body {
      background-color: #f4f6f9;
      color: #1F2937;
    }

    /* Top Navigation Header */
    .header-container {
      background-color: #ffffff;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #e5e7eb;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo i { color: #C00000; font-size: 32px; }

    .brand-text h1 { color: #C00000; font-size: 22px; font-weight: 800; line-height: 1; }
    .brand-text p { color: #0A2A66; font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-top: 3px; }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .btn-action {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-login { background: #0A2A66; color: #ffffff; border: 1px solid #0A2A66; }

    /* Language Switcher */
    .lang-switcher {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      padding: 5px 10px;
      border-radius: 6px;
    }

    .lang-switcher select {
      border: none;
      outline: none;
      background: transparent;
      font-weight: 700;
      cursor: pointer;
      color: #0A2A66;
    }

    /* Container Box */
    .form-wrapper {
      max-width: 850px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      overflow: hidden;
      border: 1px solid #E5E7EB;
    }

    .form-header {
      background: linear-gradient(135deg, #0A2A66 0%, #05183d 100%);
      color: #ffffff;
      padding: 30px;
      text-align: center;
    }

    .form-header h2 { font-size: 26px; font-weight: 700; color: #FFD700; margin-bottom: 8px; }
    .form-header p { font-size: 14px; color: #E5E7EB; }

    .form-body { padding: 35px; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width { grid-column: span 2; }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #0A2A66;
    }

    .form-group label span { color: #C00000; }

    .form-group input, .form-group select {
      padding: 12px 14px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: #C00000;
      box-shadow: 0 0 0 3px rgba(192, 0, 0, 0.1);
    }

    /* Pledge Box */
    .pledge-box {
      background: #FFF9E6;
      border: 1.5px solid #FFEAA8;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .pledge-box input { margin-top: 3px; cursor: pointer; width: 18px; height: 18px; }
    .pledge-box label { font-size: 13px; color: #374151; font-weight: 500; cursor: pointer; line-height: 1.5; }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      background: #C00000;
      color: #ffffff;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: background 0.3s;
    }

    .btn-submit:hover { background: #990000; }

    /* Footer */
    footer {
      background-color: #05183d;
      color: #ffffff;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      margin-top: 50px;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: span 1; }
      .form-body { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <header class="header-container">
    <a href="index.html" class="brand-logo">
      <i class="fa-solid fa-droplet"></i>
      <div class="brand-text">
        <h1>RAKTDATA.IN</h1>
        <p>NATIONAL BLOOD DONATION MOVEMENT</p>
      </div>
    </a>
    
    <div class="header-actions">
      <!-- Language Switcher -->
      <div class="lang-switcher">
        <i class="fa-solid fa-globe" style="color: #0A2A66;"></i>
        <select onchange="location = this.value;">
          <option value="volunteer.html" selected>मराठी</option>
          <option value="volunteer-hi.html">हिंदी</option>
          <option value="volunteer-en.html">English</option>
        </select>
      </div>

      <a href="index.html" class="btn-action btn-login"><i class="fa-solid fa-house"></i> मुख्य पृष्ठ</a>
    </div>
  </header>

  <!-- Volunteer Form Container -->
  <main class="form-wrapper">
    <div class="form-header">
      <h2><i class="fa-solid fa-handshake-angle"></i> स्वयंसेवक व रक्तदाता नोंदणी</h2>
      <p>राष्ट्रीय रक्तदान चळवळीत सामील व्हा आणि अधिकृत स्वयंसेवक ओळखपत्र मिळवा.</p>
    </div>

    <form class="form-body" action="#" method="POST">
      <div class="form-grid">
        
        <!-- Full Name -->
        <div class="form-group full-width">
          <label>पूर्ण नाव (Full Name) <span>*</span></label>
          <input type="text" placeholder="उदा. दिलीप महादेव गायकवाड" required>
        </div>

        <!-- Mobile Number -->
        <div class="form-group">
          <label>व्हॉट्सॲप नंबर (WhatsApp Mobile No.) <span>*</span></label>
          <input type="tel" pattern="[0-9]{10}" placeholder="१० अंकी मोबाईल नंबर" required>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label>ई-मेल आयडी (Email ID)</label>
          <input type="email" placeholder="example@gmail.com">
        </div>

        <!-- Blood Group -->
        <div class="form-group">
          <label>रक्तगट (Blood Group) <span>*</span></label>
          <select required>
            <option value="" disabled selected>निवडा...</option>
            <option value="A+">A +ve</option>
            <option value="A-">A -ve</option>
            <option value="B+">B +ve</option>
            <option value="B-">B -ve</option>
            <option value="O+">O +ve</option>
            <option value="O-">O -ve</option>
            <option value="AB+">AB +ve</option>
            <option value="AB-">AB -ve</option>
            <option value="Don't Know">माहित नाही</option>
          </select>
        </div>

        <!-- Role Type -->
        <div class="form-group">
          <label>तुमचा सहभाग प्रकार (Role) <span>*</span></label>
          <select required>
            <option value="Volunteer">स्वयंसेवक व रक्तदाता (Volunteer & Donor)</option>
            <option value="Only Donor">फक्त रक्तदाता (Blood Donor Only)</option>
            <option value="Coordinator">विभाग समन्वयक (Coordinator)</option>
          </select>
        </div>

        <!-- State -->
        <div class="form-group">
          <label>राज्य (State) <span>*</span></label>
          <select required>
            <option value="Maharashtra" selected>महाराष्ट्र</option>
          </select>
        </div>

        <!-- District -->
        <div class="form-group">
          <label>जिल्हा (District) <span>*</span></label>

          <input type="text" placeholder="उदा. पुणे / ठाणे / मुंबई" required>
        </div>

        <!-- Pin Code -->
        <div class="form-group">
          <label>पिनकोड (Pincode) <span>*</span></label>
          <input type="text" pattern="[0-9]{6}" placeholder="६ अंकी पिनकोड" required>
        </div>

        <!-- Referral Code -->
        <div class="form-group">
          <label>रेफरल कोड / लिंक (ऐच्छिक)</label>
          <input type="text" placeholder="मित्र/संस्थेचा कोड असल्यास टाका">
        </div>

      </div>

      <!-- Oath Checkbox -->
      <div class="pledge-box">
        <input type="checkbox" id="pledge" required>
        <label for="pledge">
          <b>शपथ:</b> मी स्वतःच्या इच्छेने राष्ट्रीय रक्तदान चळवळीत सहभागी होत असून, समाजहित आणि रुग्णांच्या सेवेसाठी सदैव तत्पर राहीन अशी शपथ घेतो/घेते.
        </label>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-id-card"></i> मोहिमेत सामील व्हा आणि डॅशबोर्ड उघडा
      </button>

    </form>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2026 RAKTDATA.IN | National Blood Donation Movement. All Rights Reserved.
  </footer>

</body>
</html>

                <!-- ==========================================
                     १. LOGIN FORM (लॉगिन फॉर्म)
                     ========================================== -->
                <form id="form-login" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">ईमेल आयडी (Email)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400"><i class="fa-solid fa-envelope text-sm"></i></span>
                            <input type="email" placeholder="तुमचा ईमेल टाका" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl pl-10 pr-4 py-3 text-sm transition outline-none">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-bold text-gray-700 uppercase">पासवर्ड (Password)</label>
                            <a href="#forgot" class="text-xs font-semibold text-red-600 hover:underline">पासवर्ड विसरलात?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400"><i class="fa-solid fa-lock text-sm"></i></span>
                            <input type="password" placeholder="••••••••" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl pl-10 pr-4 py-3 text-sm transition outline-none">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-md transition duration-300 mt-2">
                        डॅशबोर्डवर प्रवेश करा
                    </button>
                </form>

                <!-- ==========================================
                     २. REGISTER FORM (नोंदणी फॉर्म - सुरुवातीला लपवलेला)
                     ========================================== -->
                <form id="form-register" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">पूर्ण नाव (Full Name)</label>
                        <input type="text" placeholder="पहिले आणि आडनाव" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl px-4 py-3 text-sm transition outline-none">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">ईमेल आयडी (Email)</label>
                            <input type="email" placeholder="name@gmail.com" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl px-4 py-3 text-sm transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">मोबाईल नंबर (WhatsApp)</label>
                            <input type="tel" pattern="[0-9]{10}" placeholder="10 अंकी नंबर" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl px-4 py-3 text-sm transition outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">पासवर्ड तयार करा</label>
                            <input type="password" placeholder="किमान ६ अक्षरे" required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl px-4 py-3 text-sm transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">रक्तगट निवडा</label>
                            <select required class="w-full bg-gray-50 border border-gray-200 focus:border-red-500 focus:bg-white rounded-xl px-4 py-3 text-sm font-bold text-red-600 transition outline-none">
                                <option value="" disabled selected>निवडा...</option>
                                <option>A +ve</option><option>A -ve</option><option>B +ve</option><option>B -ve</option>
                                <option>O +ve</option><option>O -ve</option><option>AB +ve</option><option>AB -ve</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-start space-x-2 pt-2">
                        <input type="checkbox" required class="mt-1 text-red-600 rounded border-gray-300 focus:ring-0">
                        <p class="text-xs text-gray-500">मी नियमांचे पालन करण्यास आणि रक्त तुटवडा दूर करण्यासाठी प्रामाणिकपणे मदत करण्यास सहमत आहे.</p>
                    </div>

                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-md transition duration-300 mt-2">
                        खाते तयार करा (Register)
                    </button>
                </form>

            </div>
        </div>

    <!-- Simple Footer -->
    <footer class="bg-white border-t border-gray-100 py-4 text-center text-xs text-gray-400">

    </footer>

    <!-- ==========================================
         JAVASCRIPT FOR TAB TOGGLING
         ========================================== -->
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');

        tabLogin.addEventListener('click', () => {
            // Highlight Tab
            tabLogin.classList.add('border-red-600', 'text-red-600');
            tabRegister.classList.remove('border-red-600', 'text-red-600');
            tabRegister.classList.add('border-transparent');
            // Show/Hide Form
            formLogin.classList.remove('hidden');
            formRegister.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            // Highlight Tab
            tabRegister.classList.add('border-red-600', 'text-red-600');
            tabLogin.classList.remove('border-red-600', 'text-red-600');
            tabLogin.classList.add('border-transparent');
            // Show/Hide Form
            formRegister.classList.remove('hidden');
            formLogin.classList.add('hidden');
        });

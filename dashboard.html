<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्वयंसेवक डॅशबोर्ड | RAKTDATA.IN</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- मुख्य डॅशबोर्ड रचना -->
    <div class="min-h-screen flex flex-col">
        <!-- टॉप नेव्हिगेशन बार -->
        <header class="bg-red-600 text-white shadow-md p-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-droplet text-2xl text-white"></i>
                <span class="text-xl font-bold tracking-wider">RAKTDATA.IN</span>
            </div>
            <button id="btn-logout" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>लॉगआउट
            </button>
        </header>

        <!-- मुख्य कंटेन्ट -->
        <main class="flex-1 p-6 max-w-4xl mx-auto w-full">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6 text-center">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">जय हिंद, स्वयंसेवक! 👋</h1>
                <p class="text-gray-600">तुमचे राष्ट्रीय रक्तदाता चळवळीचे डिजिटल ओळखपत्र खाली तयार आहे.</p>
            </div>

            <!-- डिजिटल ओळखपत्र (ID Card) -->
            <div class="max-w-md mx-auto bg-gradient-to-br from-red-600 to-red-800 text-white rounded-2xl shadow-xl overflow-hidden border border-red-500 relative p-6 mb-6">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <i class="fa-solid fa-droplet text-9xl"></i>
                </div>
                
                <div class="flex justify-between items-start border-b border-red-500/50 pb-4 mb-4">
                    <div>
                        <h2 class="text-lg font-bold tracking-wide">RAKTDATA.IN</h2>
                        <p class="text-xs text-red-200">NATIONAL BLOOD DONATION MOVEMENT</p>
                    </div>
                    <span id="badge-blood" class="bg-white text-red-600 font-black text-xl px-3 py-1 rounded-lg shadow-sm">
                        --
                    </span>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-red-200 block uppercase tracking-wider">स्वयंसेवकाचे नाव</label>
                        <p id="card-name" class="text-xl font-bold tracking-wide">माहिती लोड होत आहे...</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-red-200 block uppercase tracking-wider">मोबाईल नंबर</label>
                            <p id="card-phone" class="text-sm font-semibold tracking-wide">--</p>
                        </div>
                        <div>
                            <label class="text-xs text-red-200 block uppercase tracking-wider">ईमेल आयडी</label>
                            <p id="card-email" class="text-sm font-semibold truncate">--</p>
                        </div>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-red-500/50 flex justify-between items-center text-xs text-red-100">
                    <span>STATUS: ACTIVE VOLUNTEER</span>
                    <i class="fa-solid fa-qrcode text-2xl opacity-80"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- ─── JAVASCRIPT & FIREBASE INTEGRATION ─── -->
    <script type="module">
        // फायरबेस मॉड्युल्स इम्पोर्ट करणे
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // तुमचा अचूक Firebase Configuration कोड (रंगीत दिसण्यासाठी योग्य फॉरमॅट)
        const firebaseConfig = {
            apiKey: "AIzaSyD4uQCBK2VW9OC1xWIApRVxd_zlmN45PFY",
            authDomain: "raktdata-d13f6.firebaseapp.com",
            databaseURL: "https://raktdata-d13f6-default-rtdb.firebaseio.com",
            projectId: "raktdata-d13f6",
            storageBucket: "raktdata-d13f6.firebasestorage.app",
            messagingSenderId: "1069694803367",
            appId: "1:1069694803367:web:d2f6f3d8360d69ef462a82",
            measurementId: "G-1TXPB99M62"
        };

        // फायरबेस ॲप इनिशिअलाईज करणे
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // युझर लॉगिन स्टेट तपासणे आणि डेटा लोड करणे
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // युझरच्या UID वरून Firestore मधून डेटा आणणे
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        
                        // ओळखपत्रावर डेटा सेट करणे
                        document.getElementById("card-name").innerText = userData.name || "नाव उपलब्ध नाही";
                        document.getElementById("card-phone").innerText = userData.phone || "--";
                        document.getElementById("card-email").innerText = user.email || "--";
                        document.getElementById("badge-blood").innerText = userData.bloodGroup || "--";
                    } else {
                        console.log("डेटाबेसमध्ये युझरचा अतिरिक्त डेटा सापडला नाही.");
                        document.getElementById("card-name").innerText = "स्वयंसेवक";
                        document.getElementById("card-email").innerText = user.email;
                    }
                } catch (error) {
                    console.error("डेटा आणताना एरर आला:", error);
                }
            } else {
                // जर युझर लॉगिन नसेल, तर त्याला लॉगिन पेजवर पाठवा
                window.location.href = "auth.html";
            }
        });

        // लॉगआउट लॉजिक
        document.getElementById("btn-logout").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "auth.html";
            }).catch((error) => {
                alert("लॉगआउट करताना चूक झाली: " + error.message);
            });
        });
    </script>
</body>
</html>

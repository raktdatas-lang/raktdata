<!-- सुधारित सुरक्षित फायरबेस लॉजिक -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4uQCBK2VW9Oc1xWIAPRVxd_zlmN45PFY",
            authDomain: "raktdata-d13f6.firebaseapp.com",
            databaseURL: "https://raktdata-d13f6-default-rtdb.firebaseio.com",
            projectId: "raktdata-d13f6",
            storageBucket: "raktdata-d13f6.firebasestorage.app",
            messagingSenderId: "1069694803367",
            appId: "1:1069694803367:web:d2f6f3d8360d69ef462a82",
            measurementId: "G-1TXPB99M62"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    
                    // 🚨 सुरक्षा तपासणी: जर युझरचा status 'approved' नसेल तर पत्र दाखवू नका
                    if (userData.status !== "approved") {
                        document.getElementById('print-area').innerHTML = `
                            <div class="text-center py-20">
                                <i class="fa-solid fa-user-shield text-red-600 text-5xl mb-4"></i>
                                <h2 class="text-xl font-bold text-gray-800">प्रवेश नाकारला!</h2>
                                <p class="text-sm text-gray-600 mt-2">तुमचे नियुक्तीपत्र अद्याप मुख्य कार्यालयाकडून मंजूर (Approve) झालेले नाही.</p>
                                <a href="dashboard.html" class="mt-4 inline-block bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded">डॅशबोर्डवर परत जा</a>
                            </div>
                        `;
                        document.getElementById('btn-download').style.display = 'none'; // डाउनलोड बटण लपवा
                        return;
                    }

                    // जर मंजूर असेल तरच डेटा दाखवा
                    document.getElementById('lbl-name').innerText = userData.name || "स्वयंसेवकाचे नाव";
                    document.getElementById('lbl-volunteer-id').innerText = userData.volunteerId || "RDN-PENDING";
                    document.getElementById('lbl-dept').innerText = userData.department || "स्थानिक विभाग";
                    document.getElementById('lbl-subject-role').innerText = userData.role || "स्वयंसेवक";
                }
            } else {
                window.location.href = "auth.html";
            }
        });

        // PDF डाउनलोड लॉजिक
        document.getElementById('btn-download').addEventListener('click', () => {
            const element = document.getElementById('print-area');
            const options = {
                margin:       0.2,
                filename:     'Raktdata_Niyukti_Patra.pdf',
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 3, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        });
    </script>
